<!DOCTYPE html>
<html>
<head>
    <title>Cyber Security Project</title>
</head>
<body>

    <h2>نموذج إدخال آمن</h2>
    <input type="text" id="userInput" placeholder="أدخل بياناتك هنا...">
    <button onclick="validateInput()">إرسال</button>

    <script>
        function validateInput() {
            let input = document.getElementById("userInput").value;
            // منع الرموز التي تستخدم في هجمات الـ XSS
            let regex = /[<>"']/g; 
            
            if (regex.test(input)) {
                alert("تنبيه أمني: تم اكتشاف محاولة إدخال غير آمنة!");
            } else {
                alert("تم الإدخال بنجاح وبأمان.");
            }
        }
    </script>

</body>
</html>
